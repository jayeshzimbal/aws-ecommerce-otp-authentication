apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: ecommerce

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend

        image: YOUR_DOCKERHUB_USERNAME/google-backend:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 5000

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"

        readinessProbe:
          httpGet:
            path: /api
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /api
            port: 5000
          initialDelaySeconds: 20
          periodSeconds: 10